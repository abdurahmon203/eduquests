{% extends 'base.html' %}

{% block title %}Register - EduQuests{% endblock %}

{% block main_content %}
<div class="auth-wrapper">
  <div class="auth-card" style="max-width: 560px;">
    <div class="auth-header">
      <div class="auth-logo">Edu<span>Quests</span></div>
      <h2 class="auth-title">Create an Account</h2>
      <p class="auth-subtitle">Already have an account? <a href="{% url 'login' %}">Login</a></p>
    </div>
    
    <form method="POST" novalidate>
      {% csrf_token %}
      
      <div class="form-row">
        <div class="form-group">
          <label for="first_name_input">First Name</label>
          <input type="text" id="first_name_input" name="first_name" class="form-input" placeholder="John" required />
        </div>
        <div class="form-group">
          <label for="last_name_input">Last Name</label>
          <input type="text" id="last_name_input" name="last_name" class="form-input" placeholder="Doe" required />
        </div>
      </div>
      
      <div class="form-group">
        <label for="username_input">Username</label>
        <input type="text" id="username_input" name="username" class="form-input" placeholder="johndoe12" required />
      </div>
      
      <div class="form-group">
        <label for="email_input">Email Address</label>
        <input type="email" id="email_input" name="email" class="form-input" placeholder="john@example.com" required />
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label for="password_input">Password</label>
          <input type="password" id="password_input" name="password" class="form-input" placeholder="••••••••" required />
        </div>
        <div class="form-group">
          <label for="confirm_password_input">Confirm Password</label>
          <input type="password" id="confirm_password_input" name="confirm_password" class="form-input" placeholder="••••••••" required />
        </div>
      </div>
      
      <button type="submit" class="btn btn-primary form-submit-btn">Register</button>
    </form>
  </div>
</div>
{% endblock %}
