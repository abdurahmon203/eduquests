{% extends 'base.html' %}

{% block title %}Forgot Password - EduQuests{% endblock %}

{% block main_content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">Edu<span>Quests</span></div>
      <h2 class="auth-title">Forgot Password</h2>
      <p class="auth-subtitle">Enter your email and we'll send you a reset code.</p>
    </div>

    <form method="POST" novalidate>
      {% csrf_token %}
      <div class="form-group">
        <label for="id_email">Email address</label>
        {{ form.email }}
      </div>
      <button type="submit" class="btn btn-primary form-submit-btn">Send Reset Code</button>
    </form>

    <div class="auth-footer">
      <p><a href="{% url 'login' %}">Back to Login</a></p>
    </div>
  </div>
</div>
{% endblock %}
