<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>{% block title %} EduQuests {% endblock %}</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: #f5f7fb;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        background: #111827;
        color: white;
        padding: 18px 50px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .logo {
        font-size: 28px;
        font-weight: bold;
        color: #38bdf8;
      }

      nav {
        display: flex;
        gap: 25px;
      }

      nav a {
        color: white;
        text-decoration: none;
        transition: 0.3s;
        font-size: 17px;
      }

      nav a:hover {
        color: #38bdf8;
      }

      .auth-buttons {
        display: flex;
        gap: 12px;
      }

      .btn {
        padding: 10px 18px;
        border-radius: 8px;
        text-decoration: none;
        font-size: 15px;
        transition: 0.3s;
      }

      .login-btn {
        border: 1px solid #38bdf8;
        color: #38bdf8;
      }

      .login-btn:hover {
        background: #38bdf8;
        color: white;
      }

      .signup-btn {
        background: #38bdf8;
        color: white;
      }

      .signup-btn:hover {
        opacity: 0.8;
      }

      main {
        flex: 1;
        padding: 40px;
      }

      footer {
        background: #111827;
        color: white;
        padding: 25px;
        text-align: center;
        margin-top: auto;
      }

      footer p {
        margin-bottom: 10px;
      }

      .footer-links {
        display: flex;
        justify-content: center;
        gap: 20px;
      }

      .footer-links a {
        color: #38bdf8;
        text-decoration: none;
      }

      .footer-links a:hover {
        text-decoration: underline;
      }

      @media (max-width: 768px) {
        header {
          flex-direction: column;
          gap: 20px;
          padding: 20px;
        }

        nav {
          flex-wrap: wrap;
          justify-content: center;
        }

        .auth-buttons {
          width: 100%;
          justify-content: center;
        }
      }
    </style>
  </head>

  <body>
    <header>
      <div class="logo">EduQuests</div>

      <nav>
        <a href="#">Home</a>
        <a href="#">Courses</a>
        <a href="#">Leaderboard</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
      </nav>

      <div class="auth-buttons">
        <a href="/login" class="btn login-btn">Login</a>
        <a href="/register" class="btn signup-btn">Sign Up</a>
      </div>
    </header>

    <main>{% block main_content %} {% endblock %}</main>

    <footer>
      <p>© 2026 EduQuests. All rights reserved.</p>

      <div class="footer-links">
        <a href="#">Privacy Policy</a>
        <a href="#">Terms</a>
        <a href="#">Support</a>
      </div>
    </footer>
  </body>
</html>
